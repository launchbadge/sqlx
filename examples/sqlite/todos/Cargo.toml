[package]
name = "sqlx-example-sqlite-todos"
version = "0.1.0"
edition = "2018"
workspace = "../../../"

[dependencies]
anyhow = "1.0.58"
sqlx = { path = "../../../", features = [ "sqlite", "runtime-tokio", "tls-native-tls" ] }
clap = { version = "4.3.10", features = ["derive"] }
tokio = { version = "1.20.1", features = ["rt", "macros"]}
