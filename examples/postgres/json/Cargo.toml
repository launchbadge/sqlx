[package]
name = "sqlx-example-postgres-json"
version = "0.1.0"
edition = "2021"
workspace = "../../../"

[dependencies]
anyhow = "1.0.58"
dotenvy = "0.15.7"
serde = { version = "1.0.218", features = ["derive"] }
serde_json = "1.0.85"
sqlx = { path = "../../../", features = [ "runtime-tokio", "postgres", "json" ] }
clap = { version = "4.3.10", features = ["derive"] }
tokio = { version = "1.20.1", features = ["rt", "macros"]}
